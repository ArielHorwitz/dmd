general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock
}

listener {
    timeout = 240
    on-timeout = setmonbrightness --set 5
    on-resume = setmonbrightness --set 10
}

listener {
    timeout = 280
    on-timeout = notify-send -t 20000 -u low "Going idle..." -h "string:synchronous:hypridle"
    on-resume = notify-send -t 20000 -u low "Dismissed idle" -h "string:synchronous:hypridle"
}

listener {
    timeout = 300
    on-timeout = pidof hyprlock || hyprlock
}

listener {
    timeout = 300
    on-timeout = notify-send -u low "Idle" -h "string:synchronous:hypridle"
}

